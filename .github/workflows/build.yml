name: Build and Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install project in development mode
        run: pip install -e .

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 go2_extreme/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Python syntax (compile all .py files)
        run: |
          find go2_extreme -name "*.py" -exec python -m py_compile {} \;
