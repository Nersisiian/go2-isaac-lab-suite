name: Label PRs

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'
      - 'mkdocs.yml'

workflow:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/*.yml'

core:
  - changed-files:
    - any-glob-to-any-file:
      - 'go2_extreme/**'
      - 'configs/**'
      - 'train.py'
      - 'play.py'
      - 'evaluate.py'

scripts:
  - changed-files:
    - any-glob-to-any-file:
      - 'scripts/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile'
      - '.dockerignore'